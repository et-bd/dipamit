<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050508">
<title>💖 My Love</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --pk:#ff3d7f;
  --pk2:#ff80b0;
  --pk3:#ffb3cc;
  --bl:#00d4ff;
  --bl2:#4d9fff;
  --bg:#030308;
  --bg2:#08091a;
  --gold:#ffd700;
}

html{height:100%;overflow:hidden;}
body{
  height:100%;width:100%;
  background:var(--bg);
  overflow:hidden;
  font-family:'Playfair Display',serif;
  color:#fff;
  touch-action:none;
  position:fixed;
  /* Android safe area */
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

/* ═══ LAYERED BG ═══ */
#bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 120% 80% at 15% 10%, rgba(255,61,127,0.18) 0%,transparent 55%),
    radial-gradient(ellipse 100% 70% at 85% 90%, rgba(0,212,255,0.14) 0%,transparent 55%),
    radial-gradient(ellipse 60% 60% at 50% 50%, rgba(255,61,127,0.06) 0%,transparent 60%),
    linear-gradient(175deg, #030308 0%, #080916 40%, #0a0520 100%);
  animation:bgPulse 6s ease-in-out infinite alternate;
}
@keyframes bgPulse{
  0%{filter:hue-rotate(0deg) brightness(1);}
  100%{filter:hue-rotate(15deg) brightness(1.08);}
}

/* Scanline overlay for depth */
#scanlines{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  opacity:0.4;
}

/* ═══ CANVAS ═══ */
#canvas{position:fixed;inset:0;z-index:2;pointer-events:none;}

/* ═══ MAIN LAYOUT ═══ */
#app{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
  padding:10px 16px 20px;
}

/* ═══ TOP TAGLINE ═══ */
#tagline{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(0.65rem,3vw,0.85rem);
  color:rgba(255,179,204,0.55);
  letter-spacing:0.22em;
  text-align:center;
  margin-bottom:6px;
  animation:fadeUp 1.5s ease both;
}

/* ═══ HEART SCENE ═══ */
#heart-scene{
  position:relative;
  width:min(82vw,360px);
  height:min(82vw,360px);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* Outer ambient glow rings */
#heart-scene::before{
  content:'';
  position:absolute;
  width:140%;height:140%;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,61,127,0.12) 0%,rgba(0,212,255,0.08) 50%,transparent 70%);
  animation:ringPulse 3s ease-in-out infinite;
  z-index:0;
}
@keyframes ringPulse{
  0%,100%{transform:scale(0.95);opacity:0.7;}
  50%{transform:scale(1.05);opacity:1;}
}

#heart-svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  overflow:visible;
  animation:heartFloat 4s ease-in-out infinite;
  z-index:2;
}
@keyframes heartFloat{
  0%,100%{transform:translateY(0px) rotate(-1deg);}
  33%{transform:translateY(-10px) rotate(0.5deg);}
  66%{transform:translateY(-6px) rotate(-0.5deg);}
}

/* ═══ PHOTO CONTAINER ═══ */
#photo-wrap{
  position:relative;
  width:48%;
  aspect-ratio:1/1;
  z-index:5;
  animation:photoFloat 4s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes photoFloat{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-8px) scale(1.02);}
}

/* Spinning gradient border */
#spin-ring{
  position:absolute;inset:-4px;
  border-radius:50%;
  background:conic-gradient(from 0deg,
    var(--pk),var(--bl),var(--pk2),var(--bl2),var(--pk3),var(--bl),var(--pk));
  animation:spinRing 3s linear infinite;
  z-index:-1;
}
@keyframes spinRing{to{transform:rotate(360deg);}}

/* Static inner mask */
#photo-mask{
  position:absolute;inset:-4px;
  border-radius:50%;
  background:conic-gradient(from 0deg,
    var(--pk),var(--bl),var(--pk2),var(--bl2),var(--pk3),var(--bl),var(--pk));
  -webkit-mask:radial-gradient(circle at center,transparent 88%,black 90%);
  mask:radial-gradient(circle at center,transparent 88%,black 90%);
  z-index:1;
}

/* Outer glow halo */
#photo-halo{
  position:absolute;inset:-16px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,61,127,0.3) 0%,rgba(0,212,255,0.2) 50%,transparent 70%);
  animation:haloBreath 2s ease-in-out infinite;
  z-index:-2;
}
@keyframes haloBreath{
  0%,100%{transform:scale(1);opacity:0.7;}
  50%{transform:scale(1.15);opacity:1;}
}

/* Second halo ring */
#photo-halo2{
  position:absolute;inset:-28px;
  border-radius:50%;
  border:1px solid rgba(255,61,127,0.2);
  animation:haloBreath 2s ease-in-out infinite 0.5s;
  z-index:-2;
}

#photo-img{
  width:100%;height:100%;
  border-radius:50%;
  object-fit:cover;
  object-position:center 12%;
  display:block;
  border:3px solid var(--bg);
  position:relative;z-index:2;
}

/* ═══ LOVE TEXT PATH ═══ */
.love-text{
  font-family:'Cinzel Decorative',serif;
  font-size:9.5px;
  font-weight:700;
  letter-spacing:2.5px;
  fill:url(#textGrad);
  filter:url(#textGlow);
}
.love-text2{
  font-family:'Cinzel Decorative',serif;
  font-size:9.5px;
  font-weight:700;
  letter-spacing:2.5px;
  fill:url(#textGrad2);
  filter:url(#textGlow);
}

/* ═══ TITLES ═══ */
#titles{
  text-align:center;
  z-index:10;
  margin-top:4px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
#main-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(0.85rem,4.5vw,1.3rem);
  font-weight:700;
  letter-spacing:0.2em;
  text-transform:uppercase;
  background:linear-gradient(90deg,var(--pk2),var(--bl),var(--pk2),var(--pk3),var(--bl));
  background-size:300% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:titleShimmer 4s linear infinite;
  filter:drop-shadow(0 0 12px rgba(255,61,127,0.5));
}
@keyframes titleShimmer{to{background-position:300% center;}}

#sub-title{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(0.65rem,3vw,0.82rem);
  color:rgba(255,179,204,0.45);
  letter-spacing:0.18em;
}

/* ═══ BOTTOM HEARTS ROW ═══ */
#hearts-row{
  display:flex;gap:10px;align-items:center;
  margin-top:6px;
  animation:fadeUp 2s ease both 0.5s;
}
.mini-heart{
  font-size:clamp(0.9rem,3.5vw,1.1rem);
  animation:heartBeat 1.4s ease-in-out infinite;
  display:inline-block;
}
.mini-heart:nth-child(2){animation-delay:0.15s;font-size:clamp(1.1rem,4.5vw,1.4rem);}
.mini-heart:nth-child(3){animation-delay:0.3s;}
@keyframes heartBeat{
  0%,100%{transform:scale(1);}
  14%{transform:scale(1.3);}
  28%{transform:scale(1);}
  42%{transform:scale(1.2);}
  70%{transform:scale(1);}
}

/* ═══ DECORATIVE CORNERS ═══ */
.corner{position:fixed;width:50px;height:50px;z-index:15;opacity:0.4;}
.corner::before,.corner::after{content:'';position:absolute;}
.corner::before{width:100%;height:1.5px;top:0;left:0;background:linear-gradient(90deg,var(--pk),var(--bl));}
.corner::after{width:1.5px;height:100%;top:0;left:0;background:linear-gradient(180deg,var(--pk),var(--bl));}
.corner.tl{top:env(safe-area-inset-top,16px);left:16px;}
.corner.tr{top:env(safe-area-inset-top,16px);right:16px;transform:scaleX(-1);}
.corner.bl{bottom:env(safe-area-inset-bottom,16px);left:16px;transform:scaleY(-1);}
.corner.br{bottom:env(safe-area-inset-bottom,16px);right:16px;transform:scale(-1);}

/* ═══ FLOATING ROSE PETALS (CSS only) ═══ */
.petal{
  position:fixed;z-index:3;pointer-events:none;
  font-size:clamp(0.6rem,2vw,0.9rem);
  opacity:0;
  animation:petalFall linear infinite;
}
@keyframes petalFall{
  0%{opacity:0;transform:translateY(-20px) rotate(0deg);}
  10%{opacity:0.8;}
  90%{opacity:0.4;}
  100%{opacity:0;transform:translateY(110vh) rotate(720deg);}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* ═══ TOUCH RIPPLE ═══ */
.ripple{
  position:fixed;border-radius:50%;pointer-events:none;z-index:100;
  border:2px solid rgba(255,61,127,0.6);
  animation:rippleOut 0.8s ease-out forwards;
}
@keyframes rippleOut{
  0%{width:0;height:0;opacity:1;transform:translate(-50%,-50%);}
  100%{width:120px;height:120px;opacity:0;transform:translate(-50%,-50%);}
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="scanlines"></div>
<canvas id="canvas"></canvas>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Rose petals -->
<span class="petal" style="left:5%;animation-duration:7s;animation-delay:0s;">🌸</span>
<span class="petal" style="left:15%;animation-duration:9s;animation-delay:1.5s;">💗</span>
<span class="petal" style="left:28%;animation-duration:6s;animation-delay:0.8s;">🌸</span>
<span class="petal" style="left:42%;animation-duration:11s;animation-delay:2s;">💕</span>
<span class="petal" style="left:55%;animation-duration:8s;animation-delay:0.3s;">🌸</span>
<span class="petal" style="left:68%;animation-duration:10s;animation-delay:1.2s;">💗</span>
<span class="petal" style="left:78%;animation-duration:7.5s;animation-delay:0.6s;">🌸</span>
<span class="petal" style="left:88%;animation-duration:9.5s;animation-delay:1.8s;">💕</span>
<span class="petal" style="left:95%;animation-duration:6.5s;animation-delay:2.5s;">🌸</span>

<div id="app">
  <div id="tagline">✦ a love that words cannot hold ✦</div>

  <div id="heart-scene">
    <svg id="heart-svg" viewBox="-15 -15 230 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Animated stroke gradient -->
        <linearGradient id="strokeGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="200" y2="190">
          <stop offset="0%" stop-color="#ff3d7f"><animate attributeName="stop-color" values="#ff3d7f;#00d4ff;#ff80b0;#ff3d7f" dur="4s" repeatCount="indefinite"/></stop>
          <stop offset="50%" stop-color="#00d4ff"><animate attributeName="stop-color" values="#00d4ff;#ff80b0;#ff3d7f;#00d4ff" dur="4s" repeatCount="indefinite"/></stop>
          <stop offset="100%" stop-color="#ff80b0"><animate attributeName="stop-color" values="#ff80b0;#ff3d7f;#00d4ff;#ff80b0" dur="4s" repeatCount="indefinite"/></stop>
        </linearGradient>
        <!-- Text gradients -->
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ffb3cc"/>
          <stop offset="40%" stop-color="#00d4ff"/>
          <stop offset="100%" stop-color="#ff80b0"/>
        </linearGradient>
        <linearGradient id="textGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00d4ff"/>
          <stop offset="50%" stop-color="#ff80b0"/>
          <stop offset="100%" stop-color="#00d4ff"/>
        </linearGradient>
        <!-- Glow filter for stroke -->
        <filter id="strokeGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2.5" result="b1"/>
          <feGaussianBlur stdDeviation="5" result="b2"/>
          <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Text glow -->
        <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Outer dotted ring filter -->
        <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="1.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Outer faint heart (larger, dotted) -->
      <path d="M100,28 C100,28 55,-16 12,8 C-28,32 -14,86 28,118 L100,195 L172,118 C214,86 228,32 188,8 C145,-16 100,28 100,28 Z"
        fill="none" stroke="rgba(255,61,127,0.15)" stroke-width="1" stroke-dasharray="4,6"
        filter="url(#outerGlow)">
        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
      </path>

      <!-- Main heart stroke -->
      <path d="M100,32 C100,32 62,-8 22,12 C-18,32 -8,82 32,112 L100,188 L168,112 C208,82 218,32 178,12 C138,-8 100,32 100,32 Z"
        fill="none" stroke="url(#strokeGrad)" stroke-width="2" stroke-linecap="round"
        filter="url(#strokeGlow)" opacity="0.9"/>

      <!-- Inner faint fill -->
      <path d="M100,32 C100,32 62,-8 22,12 C-18,32 -8,82 32,112 L100,188 L168,112 C208,82 218,32 178,12 C138,-8 100,32 100,32 Z"
        fill="url(#heartFill)" opacity="0.06">
        <defs>
          <radialGradient id="heartFill" cx="50%" cy="40%" r="55%">
            <stop offset="0%" stop-color="#ff3d7f"/>
            <stop offset="100%" stop-color="#00d4ff"/>
          </radialGradient>
        </defs>
      </path>

      <!-- TEXT PATH (invisible) -->
      <path id="hp" d="M100,32 C100,32 62,-8 22,12 C-18,32 -8,82 32,112 L100,188 L168,112 C208,82 218,32 178,12 C138,-8 100,32 100,32 Z" fill="none" stroke="none"/>

      <!-- Flowing text layer 1 -->
      <text class="love-text">
        <textPath href="#hp" startOffset="0%">
          ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥&#160;
          <animate attributeName="startOffset" from="0%" to="-100%" dur="9s" repeatCount="indefinite"/>
        </textPath>
      </text>
      <!-- Flowing text layer 2 (continuous) -->
      <text class="love-text2">
        <textPath href="#hp" startOffset="100%">
          ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥&#160;
          <animate attributeName="startOffset" from="100%" to="0%" dur="9s" repeatCount="indefinite"/>
        </textPath>
      </text>

      <!-- Sparkle dots on path (static decorative) -->
      <circle cx="100" cy="32" r="2.5" fill="#ff3d7f" opacity="0.8" filter="url(#strokeGlow)">
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="32" cy="112" r="2" fill="#00d4ff" opacity="0.7" filter="url(#strokeGlow)">
        <animate attributeName="opacity" values="0.7;0.15;0.7" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
      <circle cx="168" cy="112" r="2" fill="#ff80b0" opacity="0.7" filter="url(#strokeGlow)">
        <animate attributeName="opacity" values="0.7;0.15;0.7" dur="2.2s" repeatCount="indefinite" begin="1s"/>
      </circle>
      <circle cx="100" cy="188" r="2.5" fill="#00d4ff" opacity="0.8" filter="url(#strokeGlow)">
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
      </circle>
    </svg>

    <!-- Photo in center -->
    <div id="photo-wrap">
      <div id="photo-halo"></div>
      <div id="photo-halo2"></div>

// ══ CANVAS: particles + shooting stars ══
const cv = document.getElementById('canvas');
const cx = cv.getContext('2d');
let W, H;

function resize() {
  W = cv.width = window.innerWidth;
  H = cv.height = window.innerHeight;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
}
resize();
window.addEventListener('resize', resize);

// Particles
const PARTS = [];
const N = 80;

function randColor() {
  return Math.random() < 0.5
    ? `rgba(${255},${Math.floor(Math.random()*80+30)},${Math.floor(Math.random()*100+80)},`
    : `rgba(${Math.floor(Math.random()*20)},${Math.floor(Math.random()*120+150)},255,`;
}

class Particle {
  constructor(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : H + 5;
    this.r = Math.random() * 2.2 + 0.3;
    this.vy = -(Math.random() * 0.6 + 0.15);
    this.vx = (Math.random() - 0.5) * 0.3;
    this.a = Math.random() * 0.6 + 0.1;
    this.da = 0.0005 + Math.random()*0.0004;
    this.col = randColor();
  }
  update() {
    this.y += this.vy; this.x += this.vx; this.a -= this.da;
    if (this.y < -5 || this.a <= 0) { this.x = Math.random()*W; this.y = H+5; this.a = Math.random()*0.6+0.1; this.col = randColor(); }
  }
  draw() {
    cx.beginPath();
    cx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    cx.fillStyle = this.col + this.a + ')';
    cx.shadowColor = this.col + (this.a*0.8) + ')';
    cx.shadowBlur = 7;
    cx.fill();
  }
}
for (let i = 0; i < N; i++) PARTS.push(new Particle(true));

// Shooting stars
const STARS = [];
class Star {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random()*W;
    this.y = Math.random()*H*0.4;
    this.len = Math.random()*80+40;
    this.speed = Math.random()*4+3;
    this.a = Math.random()*0.6+0.2;
    this.angle = Math.PI/4 + (Math.random()-0.5)*0.3;
    this.life = 0;
    this.maxLife = this.len / this.speed;
    this.active = false;
    this.nextFire = Date.now() + Math.random()*5000+3000;
  }
  update() {
    if (!this.active) { if (Date.now() > this.nextFire) this.active = true; return; }
    this.x += Math.cos(this.angle)*this.speed;
    this.y += Math.sin(this.angle)*this.speed;
    this.life++;
    if (this.life > this.maxLife) this.reset();
  }
  draw() {
    if (!this.active) return;
    const progress = this.life/this.maxLife;
    const alpha = this.a * (1-progress);
    cx.beginPath();
    cx.moveTo(this.x, this.y);
    cx.lineTo(this.x - Math.cos(this.angle)*this.len*(1-progress), this.y - Math.sin(this.angle)*this.len*(1-progress));
    const g = cx.createLinearGradient(this.x, this.y, this.x - Math.cos(this.angle)*this.len, this.y - Math.sin(this.angle)*this.len);
    g.addColorStop(0, `rgba(255,200,220,${alpha})`);
    g.addColorStop(1, 'rgba(255,200,220,0)');
    cx.strokeStyle = g;
    cx.lineWidth = 1.5;
    cx.stroke();
  }
}
for (let i=0;i<4;i++) STARS.push(new Star());

function loop() {
  cx.clearRect(0,0,W,H);
  PARTS.forEach(p=>{p.update();p.draw();});
  STARS.forEach(s=>{s.update();s.draw();});
  requestAnimationFrame(loop);
}
loop();

// ══ TOUCH RIPPLE ══
document.addEventListener('touchstart', (e)=>{
  e.preventDefault && (() => {})();
  const t = e.touches[0];
  const el = document.createElement('div');
  el.className = 'ripple';
  el.style.left = t.clientX + 'px';
  el.style.top  = t.clientY + 'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 800);
}, {passive:true});

// ══ PHOTO heartbeat on tap ══
const photoWrap = document.getElementById('photo-wrap');
photoWrap.addEventListener('touchstart', ()=>{
  photoWrap.style.animation = 'none';
  photoWrap.style.transform = 'scale(1.15)';
  photoWrap.style.transition = 'transform 0.15s ease';
  setTimeout(()=>{
    photoWrap.style.transform = 'scale(1)';
    setTimeout(()=>{
      photoWrap.style.transform = '';
      photoWrap.style.transition = '';
      photoWrap.style.animation = 'photoFloat 4s ease-in-out infinite';
    }, 200);
  }, 150);
}, {passive:true});
</script>
</body>
</html>
