<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>💖 My Love</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050508;
    --deep: #07081a;
    --pink: #ff4d8d;
    --pink-light: #ff80b0;
    --blue: #4d9fff;
    --blue-neon: #00c3ff;
    --glow-pink: rgba(255,77,141,0.6);
    --glow-blue: rgba(0,195,255,0.5);
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    color: white;
  }
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(255,77,141,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 70% 50% at 80% 70%, rgba(0,195,255,0.10) 0%, transparent 60%),
                linear-gradient(160deg, #050508 0%, #07081a 50%, #050508 100%);
    animation: bgShift 8s ease-in-out infinite alternate;
  }
  @keyframes bgShift {
    0%   { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(20deg); }
  }
  #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  #scene {
    position: fixed; inset: 0; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  #heart-wrap {
    position: relative;
    width: min(88vw, 420px);
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 0 30px var(--glow-pink)) drop-shadow(0 0 60px var(--glow-blue));
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
  }
  #heart-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }
  #heart-path-stroke {
    fill: none;
    stroke: url(#strokeGrad);
    stroke-width: 1.5;
    opacity: 0.7;
    filter: url(#glow);
  }
  #photo-ring {
    position: relative;
    width: 52%;
    aspect-ratio: 1/1;
    border-radius: 50%;
    z-index: 10;
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  #photo-ring::before {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--pink), var(--blue-neon), var(--pink), var(--blue-neon), var(--pink));
    animation: spinGrad 4s linear infinite;
    z-index: -1;
  }
  @keyframes spinGrad { to { transform: rotate(360deg); } }
  #photo-ring::after {
    content: '';
    position: absolute; inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,77,141,0.25) 0%, transparent 70%);
    z-index: -2;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.6; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.12); }
  }
  #photo-img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    display: block;
    border: 3px solid rgba(5,5,8,1);
  }
  .love-text {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    fill: url(#textGrad);
    filter: url(#textGlow);
  }
  #title {
    margin-top: 22px;
    text-align: center;
    z-index: 10;
    position: relative;
  }
  #title h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.1rem, 5vw, 1.6rem);
    font-weight: 400;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--pink-light), var(--blue-neon), var(--pink-light));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  #title p {
    margin-top: 6px;
    font-size: clamp(0.75rem, 3vw, 0.9rem);
    font-style: italic;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.12em;
  }
  .corner {
    position: fixed; width: 60px; height: 60px;
    z-index: 3; opacity: 0.3;
  }
  .corner::before, .corner::after {
    content: ''; position: absolute;
    background: linear-gradient(90deg, var(--pink), var(--blue-neon));
  }
  .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
  .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
  .corner.tr { top: 20px; right: 20px; transform: rotate(90deg); }
  .corner.bl { bottom: 20px; left: 20px; transform: rotate(270deg); }
  .corner.br { bottom: 20px; right: 20px; transform: rotate(180deg); }
  .corner.tl { top: 20px; left: 20px; }
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="particles"></canvas>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div id="scene">
  <div id="heart-wrap">
    <svg id="heart-svg" viewBox="-10 -10 220 210" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#ff4d8d"/>
          <stop offset="50%"  stop-color="#00c3ff"/>
          <stop offset="100%" stop-color="#ff4d8d"/>
          <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="4s" repeatCount="indefinite"/>
        </linearGradient>
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#ff80b0"/>
          <stop offset="50%"  stop-color="#00c3ff"/>
          <stop offset="100%" stop-color="#ff80b0"/>
        </linearGradient>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="textGlow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path id="heart-path-stroke"
        d="M100,30 C100,30 60,-10 20,10 C-20,30 -10,80 30,110 L100,185 L170,110 C210,80 220,30 180,10 C140,-10 100,30 100,30 Z"/>
      <path id="heartTextPath"
        d="M100,30 C100,30 60,-10 20,10 C-20,30 -10,80 30,110 L100,185 L170,110 C210,80 220,30 180,10 C140,-10 100,30 100,30 Z"
        fill="none" stroke="none"/>
      <text class="love-text">
        <textPath href="#heartTextPath" startOffset="0%">
          ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U &nbsp;
          <animate attributeName="startOffset" from="0%" to="-100%" dur="8s" repeatCount="indefinite"/>
        </textPath>
      </text>
      <text class="love-text">
        <textPath href="#heartTextPath" startOffset="100%">
          ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U ♥ I LOVE U &nbsp;
          <animate attributeName="startOffset" from="100%" to="0%" dur="8s" repeatCount="indefinite"/>
        </textPath>
      </text>
    </svg>
